version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_SECRET=your-secret-key-change-in-production
      - DATABASE_URL=file:/app/data/savysav.db
    volumes:
      - savysav-data:/app/data
    restart: unless-stopped

volumes:
  savysav-data:
